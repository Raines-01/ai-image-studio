name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller requests
      - run: python -m PyInstaller --clean ai-image-studio.spec
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/ai-image-studio.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller requests
      - run: python3 -m PyInstaller --clean ai-image-studio.spec
      - name: Create AppImage
        run: |
          APPDIR="dist/AppDir"
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          cp dist/ai-image-studio "$APPDIR/usr/bin/"
          cp static/logo.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/ai-image-studio.png"
          cp static/logo.png "$APPDIR/ai-image-studio.png"

          cat > "$APPDIR/ai-image-studio.desktop" << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=AI Image Studio
          Comment=Local web tool for image generation APIs
          Exec=ai-image-studio
          Icon=ai-image-studio
          Categories=Graphics;
          Terminal=true
          EOF

          cat > "$APPDIR/AppRun" << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin/:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib/:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/ai-image-studio" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          curl -L -o /tmp/appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool
          ARCH=x86_64 /tmp/appimagetool "$APPDIR" dist/ai-image-studio-linux.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/ai-image-studio-linux.AppImage

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller requests
      - run: python3 -m PyInstaller --clean ai-image-studio.spec
      - name: Create macOS .app bundle
        run: |
          APP="dist/AI Image Studio.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp dist/ai-image-studio "$APP/Contents/MacOS/"
          cp static/logo.png "$APP/Contents/Resources/icon.png"

          cat > "$APP/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>ai-image-studio</string>
            <key>CFBundleName</key>
            <string>AI Image Studio</string>
            <key>CFBundleDisplayName</key>
            <string>AI Image Studio</string>
            <key>CFBundleIdentifier</key>
            <string>com.raines.ai-image-studio</string>
            <key>CFBundleVersion</key>
            <string>1.0.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleIconFile</key>
            <string>icon</string>
          </dict>
          </plist>
          EOF
      - name: Create DMG
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "AI Image Studio" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "AI Image Studio.app" 150 190 \
            --hide-extension "AI Image Studio.app" \
            "dist/ai-image-studio-macos.dmg" \
            "dist/AI Image Studio.app" || \
          ditto -c -k --sequesterRsrc --keepParent "dist/AI Image Studio.app" "dist/ai-image-studio-macos.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/ai-image-studio-macos.dmg
            dist/ai-image-studio-macos.zip

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/windows-build/ai-image-studio.exe release/
          cp artifacts/linux-build/ai-image-studio-linux.AppImage release/
          if [ -f artifacts/macos-build/ai-image-studio-macos.dmg ]; then
            cp artifacts/macos-build/ai-image-studio-macos.dmg release/
          else
            cp artifacts/macos-build/ai-image-studio-macos.zip release/
          fi
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/ai-image-studio.exe
            release/ai-image-studio-linux.AppImage
            release/ai-image-studio-macos.*
